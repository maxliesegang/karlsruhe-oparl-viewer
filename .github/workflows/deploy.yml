name: Deploy to GitHub Pages

on:
  # Trigger the workflow every time you push to the `main` branch
  # Using a different branch name? Replace `main` with your branch’s name
  push:
    branches: [main]
  # Runs at 03:00 and 15:00 UTC every day
  schedule:
    - cron: "0 3 * * *"
    - cron: "0 15 * * *"
  # Allows you to run this workflow manually from the Actions tab on GitHub.
  workflow_dispatch:

# Allow this job to clone the repo and create a page deployment
permissions:
  contents: read
  pages: write
  id-token: write

# Allow only one concurrent deployment, skipping runs queued between the run in-progress and latest queued.
concurrency:
  group: "pages"
  cancel-in-progress: false

jobs:
  build:
    runs-on: ubuntu-latest
    env:
      DATA_SOURCE: local
    steps:
      - name: Checkout your repository using git
        uses: actions/checkout@v7
      - name: Setup Pages
        uses: actions/configure-pages@v5
      - name: Checkout council data
        uses: actions/checkout@v7
        with:
          repository: maxliesegang/karlsruhe-oparl-syndication
          path: syndication-data
          fetch-depth: 1
      - name: Install, build, and upload your site
        uses:
          withastro/action@v6
          # with:
          # path: . # The root location of your Astro project inside the repository. (optional)
          # node-version: 24 # The specific version of Node that should be used to build your site. Defaults to 24. (optional)
        # package-manager: pnpm@latest # The Node package manager that should be used to install dependencies and build your site. Automatically detected based on your lockfile. (optional)

  deploy:
    needs: build
    runs-on: ubuntu-latest
    environment:
      name: github-pages
      url: ${{ steps.deployment.outputs.page_url }}
    steps:
      - name: Deploy to GitHub Pages
        id: deployment
        uses: actions/deploy-pages@v5
