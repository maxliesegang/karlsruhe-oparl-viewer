name: Deploy to GitHub Pages

on:
  # Trigger the workflow every time you push to the `main` branch
  # Using a different branch name? Replace `main` with your branch’s name
  push:
    branches: [main]
  # Runs at 03:00 and 15:00 UTC every day
  schedule:
    - cron: "0 3 * * *"
    - cron: "0 15 * * *"
  # Allows you to run this workflow manually from the Actions tab on GitHub.
  workflow_dispatch:

# Allow this job to clone the repo and create a page deployment
permissions:
  contents: read
  pages: write
  id-token: write

# Allow only one concurrent deployment, skipping runs queued between the run in-progress and latest queued.
concurrency:
  group: "pages"
  cancel-in-progress: false

jobs:
  build:
    runs-on: ubuntu-latest
    outputs:
      data-revision: ${{ steps.data-revision.outputs.revision }}
      should-deploy: ${{ steps.changes.outputs.should-deploy }}
    env:
      DATA_SOURCE: local
    steps:
      - name: Checkout your repository using git
        uses: actions/checkout@v7

      - name: Resolve council data revision
        id: data-revision
        run: |
          revision=$(git ls-remote https://github.com/maxliesegang/karlsruhe-oparl-syndication.git HEAD | cut -f1)
          test -n "$revision"
          echo "revision=$revision" >> "$GITHUB_OUTPUT"

      # Scheduled runs are often no-ops. Remember successful viewer/data revision
      # pairs so they can skip the large data checkout and full static rebuild.
      - name: Check for an already successful scheduled build
        id: successful-build
        if: github.event_name == 'schedule'
        uses: actions/cache/restore@v4
        with:
          path: .build-markers
          key: successful-build-${{ github.sha }}-${{ steps.data-revision.outputs.revision }}
          lookup-only: true

      - name: Decide whether to build
        id: changes
        run: |
          if [[ "${{ github.event_name }}" == "schedule" && "${{ steps.successful-build.outputs.cache-hit }}" == "true" ]]; then
            echo "should-deploy=false" >> "$GITHUB_OUTPUT"
            echo "Viewer and council data revisions were already deployed; skipping."
          else
            echo "should-deploy=true" >> "$GITHUB_OUTPUT"
          fi

      - name: Setup Pages
        if: steps.changes.outputs.should-deploy == 'true'
        uses: actions/configure-pages@v5
      - name: Checkout council data
        if: steps.changes.outputs.should-deploy == 'true'
        uses: actions/checkout@v7
        with:
          repository: maxliesegang/karlsruhe-oparl-syndication
          path: syndication-data
          sparse-checkout: docs
          fetch-depth: 1
      - name: Install, build, and upload your site
        if: steps.changes.outputs.should-deploy == 'true'
        uses:
          withastro/action@v6
          # with:
          # path: . # The root location of your Astro project inside the repository. (optional)
          # node-version: 24 # The specific version of Node that should be used to build your site. Defaults to 24. (optional)
        # package-manager: pnpm@latest # The Node package manager that should be used to install dependencies and build your site. Automatically detected based on your lockfile. (optional)

  deploy:
    needs: build
    if: needs.build.outputs.should-deploy == 'true'
    runs-on: ubuntu-latest
    environment:
      name: github-pages
      url: ${{ steps.deployment.outputs.page_url }}
    steps:
      - name: Deploy to GitHub Pages
        id: deployment
        uses: actions/deploy-pages@v5

      - name: Mark revision pair as successfully deployed
        run: mkdir -p .build-markers && touch .build-markers/success

      - name: Save successful deployment marker
        uses: actions/cache/save@v4
        with:
          path: .build-markers
          key: successful-build-${{ github.sha }}-${{ needs.build.outputs.data-revision }}
